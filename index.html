<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blessing</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #000;
}

.card {
  width: 360px;
  height: 640px;
  border-radius: 30px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
}

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
}

.content {
  position: relative;
  color: white;
  text-align: center;
  padding: 40px 20px;
}

h1 { font-size: 26px; }

.verse { margin-top: 20px; font-size: 18px; }
.ref { margin-top: 10px; font-size: 14px; opacity: 0.8; }
.footer { margin-top: 30px; font-style: italic; }

.controls {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 5px;
}

input {
  padding: 5px;
  border-radius: 8px;
  border: none;
  width: 120px;
}

button {
  padding: 6px 10px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="card" id="card">
  <div class="bg" id="bg"></div>
  <div class="overlay"></div>

  <div class="content">
    <h1 id="day"></h1>
    <div class="verse" id="verse">Loading...</div>
    <div class="ref" id="ref"></div>
    <div class="footer" id="footer"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="John 3:16">
    <button onclick="searchVerse()">🔍 Search</button>
    <button onclick="randomVerse()">🔁 Random</button>
    <button onclick="toggleLang()">🌍 中文/EN</button>
    <button onclick="downloadImage()">📸 保存/Download</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<script>
let isChinese = false;

const images = [
  "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "https://images.unsplash.com/photo-1493244040629-496f6d136cc3"
];

document.getElementById("bg").style.backgroundImage =
  `url(${images[Math.floor(Math.random()*images.length)]})`;

const days_en = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const days_zh = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

function updateDay(){
  const today = new Date();
  const day = isChinese ? days_zh[today.getDay()] : days_en[today.getDay()];
  document.getElementById("day").innerText =
    (isChinese ? "祝福 " : "Blessing ") + day;
}

updateDay();

async function searchVerse(){
  const query = document.getElementById("search").value || "Psalm 23:1";

  document.getElementById("verse").innerText = "Loading...";

  try{
    // 英文
    const enRes = await fetch(`https://bible-api.com/${query}`);
    const enData = await enRes.json();

    // 中文（简单处理：同reference）
    let zhText = "(中文暂未匹配)";
    try{
      const zhRes = await fetch(`https://bible-api.com/${query}?translation=chiun`);
      const zhData = await zhRes.json();
      zhText = zhData.text;
    }catch{}

    document.getElementById("verse").innerText =
      isChinese ? zhText : enData.text;

    document.getElementById("ref").innerText = enData.reference;

  }catch(e){
    document.getElementById("verse").innerText = "Verse not found";
  }

  updateFooter();
}

function randomVerse(){
  const samples = ["John 3:16","Psalm 23:1","Romans 8:28","Philippians 4:13"];
  document.getElementById("search").value =
    samples[Math.floor(Math.random()*samples.length)];
  searchVerse();
}

function toggleLang(){
  isChinese = !isChinese;
  searchVerse();
}

function updateFooter(){
  document.getElementById("footer").innerText =
    isChinese ? "愿你有美好的一天" : "Have a Beautiful Day";
}

/* 下载 */
function downloadImage(){
  const controls = document.querySelector(".controls");
  controls.style.display = "none";

  html2canvas(document.getElementById("card"), {scale:2}).then(canvas=>{
    const link = document.createElement("a");
    link.download = "blessing.png";
    link.href = canvas.toDataURL();
    link.click();
    controls.style.display = "flex";
  });
}

searchVerse();
</script>

</body>
</html>
