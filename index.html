<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blessing</title>

<style>
body {
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family: "Georgia", serif;
}

.card {
  width:360px;
  height:640px;
  position:relative;
  overflow:hidden;
  background:#000;
}

/* 背景 */
.bg-img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.9);
}

/* 柔光层（高级感关键） */
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.25), transparent 60%),
    linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.6));
}

/* 内容 */
.content {
  position:relative;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  color:white;
  padding:110px 25px 80px;
  text-shadow:0 3px 15px rgba(0,0,0,0.6);
}

h1 {
  font-size:26px;
  letter-spacing:1px;
  margin-bottom:20px;
}

/* 英文 */
.verse-en {
  font-size:17px;
  line-height:1.6;
  opacity:0.95;
}

/* 中文（更突出） */
.verse-zh {
  font-size:20px;
  line-height:1.7;
  margin-top:12px;
  font-weight:500;
}

/* 引用 */
.ref {
  margin-top:12px;
  font-size:13px;
  opacity:0.8;
}

/* 底部祝福 */
.footer {
  margin-top:30px;
  font-size:14px;
  opacity:0.9;
}

/* 控件 */
.controls {
  position:absolute;
  bottom:12px;
  width:100%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
}

input {
  width:120px;
  border-radius:8px;
  border:none;
  padding:5px;
}

button {
  border:none;
  border-radius:10px;
  padding:6px 10px;
  background:white;
  font-size:12px;
}
</style>
</head>

<body>

<div class="card" id="card">
  <img id="bg" class="bg-img">
  <div class="overlay"></div>

  <div class="content">
    <h1 id="day"></h1>
    <div class="verse-en" id="verse-en">Loading...</div>
    <div class="verse-zh" id="verse-zh"></div>
    <div class="ref" id="ref"></div>
    <div class="footer">愿你有平安喜乐的一天</div>
  </div>

  <div class="controls">
    <input id="search" placeholder="John / 诗篇">
    <button onclick="searchVerse()">🔍 Search</button>
    <button onclick="randomVerse()">🔁 Random</button>
    <button onclick="downloadImage()">⬇️ Download</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<script>
let isCapturing=false;

/* 🌸 花+风景混合 */
const images=[
"https://picsum.photos/id/1018/400/700",
"https://picsum.photos/id/1015/400/700",
"https://picsum.photos/id/1025/400/700",
"https://picsum.photos/id/1033/400/700",
"https://picsum.photos/id/1056/400/700",
"https://picsum.photos/id/106/400/700",
"https://picsum.photos/id/1074/400/700",
"https://picsum.photos/id/1084/400/700"
];

function randomBg(){
  if(isCapturing) return;
  document.getElementById("bg").src =
    images[Math.floor(Math.random()*images.length)];
}

const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function updateDay(){
  document.getElementById("day").innerText =
    "Blessing " + days[new Date().getDay()];
}

const zhMap={
"John 3:16":"神爱世人，甚至将他的独生子赐给他们...",
"Psalm 23:1":"耶和华是我的牧者，我必不致缺乏。",
"Romans 8:28":"万事都互相效力，叫爱神的人得益处。",
"Philippians 4:13":"我靠着那加给我力量的，凡事都能做。"
};

function parseInput(input){
  if(input.includes("诗篇")) return input.replace("诗篇","Psalm ");
  if(input.includes("约翰")) return input.replace("约翰福音","John ");
  return input;
}

async function searchVerse(){
  let q=document.getElementById("search").value || "Psalm 23:1";
  q=parseInput(q);

  try{
    const res=await fetch("https://bible-api.com/"+q);
    const data=await res.json();

    document.getElementById("verse-en").innerText=data.text;
    document.getElementById("verse-zh").innerText=
      zhMap[data.reference] || "（暂无中文）";
    document.getElementById("ref").innerText=data.reference;

  }catch{
    document.getElementById("verse-en").innerText="Not found";
    document.getElementById("verse-zh").innerText="未找到经文";
  }

  updateDay();
}

function randomVerse(){
  randomBg();
  const list=Object.keys(zhMap);
  document.getElementById("search").value=
    list[Math.floor(Math.random()*list.length)];
  searchVerse();
}

function downloadImage(){

  isCapturing=true;

  const controls=document.querySelector(".controls");
  controls.style.display="none";

  const img=document.getElementById("bg");

  if(!img.complete){
    img.onload=capture;
  }else{
    capture();
  }

  function capture(){
    html2canvas(document.getElementById("card"),{
      useCORS:true,
      scale:2
    }).then(canvas=>{
      const link=document.createElement("a");
      link.download="blessing.png";
      link.href=canvas.toDataURL("image/png");
      link.click();

      controls.style.display="flex";
      isCapturing=false;
    });
  }
}

document.getElementById("search").addEventListener("keydown", e=>{
  if(e.key==="Enter") e.preventDefault();
});

randomVerse();
</script>

</body>
</html>
