<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blessing</title>

<style>
body {
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Georgia,serif;
}

/* ❌ 去掉圆角 */
.card {
  width:360px;
  height:640px;
  position:relative;
  overflow:hidden;
  background:#000;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* 背景图 */
.bg-img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* 渐变 */
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.05),
    rgba(0,0,0,0.6)
  );
}

/* 内容 */
.content {
  position:relative;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  color:white;
  padding:120px 20px 80px;
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}

h1 {
  margin-bottom:20px;
  font-size:26px;
  letter-spacing:1px;
}

.verse {
  max-width:260px;
  margin:20px auto;
  line-height:1.6;
  font-size:17px;
}

.ref {
  font-size:14px;
  opacity:0.8;
}

.footer {
  margin-top:30px;
  font-style:italic;
}

/* 按钮 */
.controls {
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:6px;
}

button {
  border:none;
  border-radius:10px;
  padding:6px 10px;
  font-size:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card" id="card">
  <img id="bg" class="bg-img" crossorigin="anonymous">
  <div class="overlay"></div>

  <div class="content">
    <h1 id="day"></h1>
    <div class="verse" id="verse">Loading...</div>
    <div class="ref" id="ref"></div>
    <div class="footer">Have a Beautiful Day</div>
  </div>

  <div class="controls">
    <button onclick="randomVerse()">🔁 Random</button>
    <button onclick="downloadImage()">📸 Download</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<script>
/* ✅ 扩展图片库（10张） */
const images=[
"https://images.unsplash.com/photo-1506744038136-46273834b3fb",
"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1493244040629-496f6d136cc3",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e",
"https://images.unsplash.com/photo-1502082553048-f009c37129b9",
"https://images.unsplash.com/photo-1500534314209-a25ddb2bd429",
"https://images.unsplash.com/photo-1469474968028-56623f02e42e"
];

const bg=document.getElementById("bg");

/* 随机背景 */
function randomBg(){
  bg.src=images[Math.floor(Math.random()*images.length)];
}

/* 星期 */
const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function updateDay(){
  const d=new Date().getDay();
  document.getElementById("day").innerText="Blessing "+days[d];
}

/* 经文 */
async function randomVerse(){

  randomBg();

  const list=[
    "John 3:16",
    "Psalm 23:1",
    "Romans 8:28",
    "Philippians 4:13",
    "Isaiah 41:10",
    "Matthew 5:16",
    "Proverbs 3:5",
    "Jeremiah 29:11"
  ];

  const q=list[Math.floor(Math.random()*list.length)];

  try{
    const res=await fetch("https://bible-api.com/"+q);
    const data=await res.json();

    document.getElementById("verse").innerText=data.text;
    document.getElementById("ref").innerText=data.reference;
  }catch{
    document.getElementById("verse").innerText="Stay strong and trust God.";
    document.getElementById("ref").innerText="";
  }

  updateDay();
}

/* 下载 */
function downloadImage(){

  const controls=document.querySelector(".controls");
  controls.style.display="none";

  const img=document.getElementById("bg");

  if(!img.complete){
    img.onload=capture;
  }else{
    capture();
  }

  function capture(){
    html2canvas(document.getElementById("card"),{
      useCORS:true,
      scale:2
    }).then(canvas=>{
      const link=document.createElement("a");
      link.download="blessing.png";
      link.href=canvas.toDataURL();
      link.click();
      controls.style.display="flex";
    });
  }
}

/* 初始化 */
randomVerse();
</script>

</body>
</html>
