<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blessing</title>

<style>
body {
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Georgia,serif;
}

.card {
  width:360px;
  height:640px;
  position:relative;
  overflow:hidden;
  background:#000;
}

.bg-img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.6));
}

.content {
  position:relative;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  color:white;
  padding:120px 20px 80px;
}

h1 { margin-bottom:20px; }

.verse-en {
  font-size:17px;
  margin:10px auto;
  max-width:260px;
}

.verse-zh {
  font-size:18px;
  margin:10px auto;
  max-width:260px;
}

.ref {
  font-size:14px;
  opacity:0.8;
}

.footer {
  margin-top:30px;
  font-style:italic;
}

.controls {
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:5px;
}

input {
  width:120px;
  border-radius:8px;
  border:none;
  padding:5px;
}

button {
  border:none;
  border-radius:10px;
  padding:6px 10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card" id="card">
  <img id="bg" class="bg-img">
  <div class="overlay"></div>

  <div class="content">
    <h1 id="day"></h1>
    <div class="verse-en" id="verse-en">Loading...</div>
    <div class="verse-zh" id="verse-zh"></div>
    <div class="ref" id="ref"></div>
    <div class="footer">愿你有美好的一天</div>
  </div>

  <div class="controls">
    <input id="search" placeholder="John / 诗篇">
    <button onclick="searchVerse()">🔍 Search</button>
    <button onclick="randomVerse()">🔁 Random</button>
    <button onclick="downloadImage()">⬇️ Download</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<script>
/* 🔒 防止保存时乱跳 */
let isCapturing = false;

/* 稳定图片 */
const images = Array.from({length:10}, (_,i)=>
  "https://picsum.photos/400/700?random="+i
);

function randomBg(){
  if(isCapturing) return;  // ✅ 锁住
  document.getElementById("bg").src =
    images[Math.floor(Math.random()*images.length)];
}

/* 星期 */
const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function updateDay(){
  document.getElementById("day").innerText =
    "Blessing " + days[new Date().getDay()];
}

/* 中文映射 */
const zhMap={
"John 3:16":"神爱世人，甚至将他的独生子赐给他们...",
"Psalm 23:1":"耶和华是我的牧者，我必不致缺乏。",
"Romans 8:28":"万事都互相效力，叫爱神的人得益处。",
"Philippians 4:13":"我靠着那加给我力量的，凡事都能做。",
"Isaiah 41:10":"你不要害怕，因为我与你同在。",
"Matthew 5:16":"你们的光也当这样照在人前。",
"Proverbs 3:5":"你要专心仰赖耶和华。",
"Jeremiah 29:11":"我知道我向你们所怀的意念。"
};

/* 中文输入解析 */
function parseInput(input){
  input=input.trim();

  if(input.includes("诗篇")) return input.replace("诗篇","Psalm ");
  if(input.includes("约翰")) return input.replace("约翰福音","John ");
  if(input.includes("罗马")) return input.replace("罗马书","Romans ");
  if(input.includes("腓立比")) return input.replace("腓立比书","Philippians ");

  return input;
}

/* 搜索（不再换背景） */
async function searchVerse(){

  let q=document.getElementById("search").value || "Psalm 23:1";
  q=parseInput(q);

  try{
    const res=await fetch("https://bible-api.com/"+q);
    const data=await res.json();

    document.getElementById("verse-en").innerText=data.text;
    document.getElementById("verse-zh").innerText =
      zhMap[data.reference] || "（暂无中文）";
    document.getElementById("ref").innerText=data.reference;

  }catch{
    document.getElementById("verse-en").innerText="Not found";
    document.getElementById("verse-zh").innerText="未找到经文";
    document.getElementById("ref").innerText="";
  }

  updateDay();
}

/* 随机（才换背景） */
function randomVerse(){
  randomBg();
  const list=Object.keys(zhMap);
  document.getElementById("search").value =
    list[Math.floor(Math.random()*list.length)];
  searchVerse();
}

/* 🚀 Download（终极稳定版） */
function downloadImage(){

  isCapturing = true;

  const controls=document.querySelector(".controls");
  controls.style.display="none";

  const img=document.getElementById("bg");

  if(!img.complete){
    img.onload=capture;
  }else{
    capture();
  }

  function capture(){
    html2canvas(document.getElementById("card"),{
      useCORS:true,
      scale:2
    }).then(canvas=>{
      const link=document.createElement("a");
      link.download="blessing.png";
      link.href=canvas.toDataURL("image/png");
      link.click();

      controls.style.display="flex";
      isCapturing = false;
    });
  }
}

/* 防止回车触发 */
document.getElementById("search").addEventListener("keydown", e=>{
  if(e.key==="Enter") e.preventDefault();
});

/* 初始化 */
randomVerse();
</script>

</body>
</html>
