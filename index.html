<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Blessing</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Georgia", serif;
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 整体模糊背景 */
.bg-blur {
  position: fixed;
  width: 100%;
  height: 100%;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.3);
}

/* 卡片容器（手机比例） */
.card-wrapper {
  position: relative;
  width: 360px;
  height: 640px;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* 卡片背景 */
.card-bg {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  filter: brightness(0.8);
}

/* 渐变层 */
.gradient {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
}

/* 内容 */
.content {
  position: relative;
  z-index: 2;
  color: white;
  text-align: center;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
}

h1 {
  font-size: 28px;
  margin-bottom: 20px;
}

.verse {
  font-size: 18px;
  line-height: 1.6;
}

.ref {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

.footer {
  margin-top: 30px;
  font-style: italic;
  font-size: 16px;
}

/* 按钮 */
.controls {
  position: absolute;
  bottom: 15px;
  width: 100%;
  display: flex;
  justify-content: space-around;
  z-index: 3;
}

button {
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.9);
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="bg-blur"></div>

<div class="card-wrapper" id="card">
  <div class="card-bg" id="bg"></div>
  <div class="gradient"></div>

  <div class="content">
    <h1 id="day"></h1>
    <div class="verse" id="verse"></div>
    <div class="ref" id="ref"></div>
    <div class="footer" id="footer"></div>
  </div>

  <div class="controls">
    <button onclick="toggleLang()">🌍 中文/EN</button>
    <button onclick="downloadImage()">📸 保存图片</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<script>
let isChinese = false;

const verses = [
  {
    en: "Be still, and know that I am God.",
    zh: "你们要休息，要知道我是神。",
    ref: "Psalm 46:10"
  },
  {
    en: "I can do all things through Christ who strengthens me.",
    zh: "我靠着那加给我力量的，凡事都能做。",
    ref: "Philippians 4:13"
  },
  {
    en: "The Lord is my shepherd; I shall not want.",
    zh: "耶和华是我的牧者，我必不致缺乏。",
    ref: "Psalm 23:1"
  }
];

const images = [
  "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "https://images.unsplash.com/photo-1493244040629-496f6d136cc3"
];

const days_en = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const days_zh = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

const today = new Date();
const seed = today.getDate();

function random(seed, max) {
  const x = Math.sin(seed) * 10000;
  return Math.floor((x - Math.floor(x)) * max);
}

const verseIndex = random(seed, verses.length);
const imageIndex = random(seed + 1, images.length);

document.getElementById("bg").style.backgroundImage = `url(${images[imageIndex]})`;

function render() {
  const day = isChinese ? days_zh[today.getDay()] : days_en[today.getDay()];

  document.getElementById("day").innerText =
    isChinese ? "祝福 " + day : "Blessing " + day;

  document.getElementById("verse").innerText =
    isChinese ? verses[verseIndex].zh : verses[verseIndex].en;

  document.getElementById("ref").innerText = verses[verseIndex].ref;

  document.getElementById("footer").innerText =
    isChinese ? "愿你有美好的一天" : "Have a Beautiful Day";
}

render();

/* 切换语言 */
function toggleLang() {
  isChinese = !isChinese;
  render();
}

/* 下载图片（高清+隐藏按钮） */
function downloadImage() {
  const controls = document.querySelector(".controls");
  controls.style.display = "none";

  html2canvas(document.getElementById("card"), {
    scale: 2
  }).then(canvas => {
    const link = document.createElement("a");
    link.download = "blessing-card.png";
    link.href = canvas.toDataURL();
    link.click();

    controls.style.display = "flex";
  });
}
</script>

</body>
</html>
