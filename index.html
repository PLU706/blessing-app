<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blessing</title>

<style>
* {
  box-sizing:border-box;
}

body {
  margin:0;
  min-height:100vh;
  background:#111;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Georgia, "Times New Roman", "Noto Serif SC", serif;
}

.card {
  width:min(360px, 100vw);
  height:min(640px, 100vh);
  position:relative;
  overflow:hidden;
  background:#f7f4ea;
}

.bg-img {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:saturate(1.38) contrast(1.08) brightness(1.08);
}

.overlay {
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom,
      rgba(255,255,255,0.95) 0%,
      rgba(255,255,255,0.86) 31%,
      rgba(255,255,255,0.38) 45%,
      rgba(255,255,255,0.02) 62%,
      rgba(0,0,0,0.04) 100%),
    radial-gradient(circle at 50% 28%, rgba(255,255,255,0.62), transparent 28%);
}

.content {
  position:relative;
  z-index:2;
  min-height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  color:#111;
  padding:28px 22px 150px;
  pointer-events:none;
}

h1 {
  margin:0 0 24px;
  color:#a40746;
  font-size:46px;
  line-height:0.94;
  font-style:italic;
  font-weight:700;
  text-shadow:0 2px 0 rgba(255,255,255,0.95);
}

.verse-en {
  font-size:21px;
  line-height:1.34;
  margin:0 auto 12px;
  max-width:318px;
  text-shadow:0 1px 0 #fff;
}

.verse-zh {
  font-size:18px;
  line-height:1.42;
  margin:0 auto 10px;
  max-width:302px;
  font-weight:700;
  text-shadow:0 1px 0 #fff;
}

.ref {
  font-size:19px;
  font-weight:700;
  text-shadow:0 1px 0 #fff;
}

.footer {
  margin-top:18px;
  color:#405a17;
  font-size:17px;
  font-style:italic;
  font-weight:700;
  text-shadow:0 1px 0 rgba(255,255,255,0.95);
}

.controls {
  position:absolute;
  z-index:3;
  left:0;
  bottom:10px;
  width:100%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  padding:0 12px;
  font-family:Arial, "Microsoft YaHei", sans-serif;
}

input {
  width:126px;
  min-height:32px;
  border-radius:8px;
  border:1px solid rgba(50,50,50,0.18);
  padding:5px 8px;
  background:rgba(255,255,255,0.93);
}

button {
  min-height:32px;
  border:1px solid rgba(50,50,50,0.18);
  border-radius:10px;
  padding:6px 10px;
  background:rgba(255,255,255,0.94);
  cursor:pointer;
}

button:hover,
input:focus {
  outline:2px solid rgba(164,7,70,0.25);
}
</style>
</head>

<body>

<div class="card" id="card">
  <img id="bg" class="bg-img" crossorigin="anonymous" alt="">
  <div class="overlay"></div>

  <div class="content">
    <h1 id="day"></h1>
    <div class="verse-en" id="verse-en">Loading...</div>
    <div class="verse-zh" id="verse-zh"></div>
    <div class="ref" id="ref"></div>
    <div class="footer">愿你有美好的一天</div>
  </div>

  <div class="controls">
    <input id="search" placeholder="John / 诗篇">
    <button onclick="searchVerse()">🔍 Search</button>
    <button onclick="randomVerse()">🔁 Random</button>
    <button onclick="downloadImage()">⬇️ Download</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<script>
let isCapturing = false;
let imageQueue = [];

const images = [
  "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1516483638261-f4dbaf036963?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1505761671935-60b3a7427bad?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1533105079780-92b9be482077?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1549144511-f099e773c147?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1519677100203-a0e668c92439?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1529260830199-42c24126f198?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1491557345352-5929e343eb89?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1467269204594-9661b134dd2b?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1513581166391-887a96ddeafd?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1527866959252-deab85ef7d1b?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1529655683826-aba9b3e77383?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1530841377377-3ff06c0ca713?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1530789253388-582c481c54b0?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1527004760525-48f9e988c10b?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1515542622106-78bda8ba0e5b?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1508182314998-3bd49473002f?auto=format&fit=crop&w=720&h=1280&q=85",
  "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?auto=format&fit=crop&w=720&h=1280&q=85"
];

function randomBg(){
  if(isCapturing) return;

  const bg = document.getElementById("bg");
  const currentSrc = bg.src;
  const nextSrc = pickImage(currentSrc);
  const preload = new Image();

  preload.crossOrigin = "anonymous";
  preload.onload = () => {
    bg.src = nextSrc;
  };
  preload.onerror = () => {
    const stillCurrent = bg.src === currentSrc;
    if(stillCurrent) randomBg();
  };
  preload.src = nextSrc;
}

function pickImage(currentSrc){
  if(images.length === 1) return images[0];

  if(imageQueue.length === 0){
    imageQueue = [...images].sort(() => Math.random() - 0.5);
  }

  let nextSrc = imageQueue.shift();

  while(currentSrc && currentSrc.includes(nextSrc.split("?")[0])){
    imageQueue.push(nextSrc);

    if(imageQueue.length === 0){
      imageQueue = [...images].sort(() => Math.random() - 0.5);
    }

    nextSrc = imageQueue.shift();
  }

  return nextSrc;
}

const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function updateDay(){
  document.getElementById("day").innerText =
    "Blessed " + days[new Date().getDay()];
}

const verseList = [
  {
    ref:"John 3:16",
    en:"For God so loved the world, that he gave his only begotten Son.",
    zh:"神爱世人，甚至将他的独生子赐给他们。"
  },
  {
    ref:"Psalm 23:1",
    en:"The Lord is my shepherd; I shall not want.",
    zh:"耶和华是我的牧者，我必不致缺乏。"
  },
  {
    ref:"Romans 8:28",
    en:"All things work together for good to them that love God.",
    zh:"万事都互相效力，叫爱神的人得益处。"
  },
  {
    ref:"Philippians 4:13",
    en:"I can do all things through Christ, who strengthens me.",
    zh:"我靠着那加给我力量的，凡事都能做。"
  },
  {
    ref:"Isaiah 41:10",
    en:"Fear thou not; for I am with thee.",
    zh:"你不要害怕，因为我与你同在。"
  },
  {
    ref:"Matthew 5:16",
    en:"Let your light so shine before men.",
    zh:"你们的光也当这样照在人前。"
  },
  {
    ref:"Proverbs 3:5",
    en:"Trust in the Lord with all thine heart.",
    zh:"你要专心仰赖耶和华。"
  },
  {
    ref:"Jeremiah 29:11",
    en:"For I know the thoughts that I think toward you, saith the Lord.",
    zh:"我知道我向你们所怀的意念。"
  }
];

const zhMap = Object.fromEntries(verseList.map(verse => [verse.ref, verse.zh]));

function renderVerse(verse){
  document.getElementById("verse-en").innerText = verse.en;
  document.getElementById("verse-zh").innerText = verse.zh;
  document.getElementById("ref").innerText = verse.ref;
  updateDay();
}

function parseInput(input){
  input = input.trim();

  if(input.includes("诗篇")) return input.replace("诗篇", "Psalm ");
  if(input.includes("约翰")) return input.replace("约翰福音", "John ");
  if(input.includes("罗马")) return input.replace("罗马书", "Romans ");
  if(input.includes("腓立比")) return input.replace("腓立比书", "Philippians ");

  return input;
}

async function searchVerse(){
  let q = document.getElementById("search").value || "Psalm 23:1";
  q = parseInput(q);
  updateDay();

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 6000);
    const res = await fetch("https://bible-api.com/" + q, { signal:controller.signal });
    clearTimeout(timeout);
    const data = await res.json();

    document.getElementById("verse-en").innerText = data.text;
    document.getElementById("verse-zh").innerText =
      zhMap[data.reference] || "（暂无中文）";
    document.getElementById("ref").innerText = data.reference;

  } catch {
    const localVerse = verseList.find(verse => verse.ref.toLowerCase() === q.toLowerCase());

    if(localVerse){
      renderVerse(localVerse);
      return;
    }

    document.getElementById("verse-en").innerText = "Not found";
    document.getElementById("verse-zh").innerText = "未找到经文";
    document.getElementById("ref").innerText = "";
  }
}

function randomVerse(){
  randomBg();
  const verse = verseList[Math.floor(Math.random() * verseList.length)];
  document.getElementById("search").value = verse.ref;
  renderVerse(verse);
}

function waitForImage(img){
  if(img.complete && img.naturalWidth > 0) return Promise.resolve();

  return new Promise((resolve, reject) => {
    img.addEventListener("load", resolve, { once:true });
    img.addEventListener("error", reject, { once:true });
  });
}

function freezeImageSource(img){
  const canvas = document.createElement("canvas");
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  return canvas.toDataURL("image/jpeg", 0.92);
}

async function downloadImage(){
  isCapturing = true;

  const controls = document.querySelector(".controls");
  controls.style.display = "none";

  const img = document.getElementById("bg");
  const originalSrc = img.src;
  let frozenSrc = "";

  try {
    await waitForImage(img);

    try {
      frozenSrc = freezeImageSource(img);
      img.src = frozenSrc;
      await waitForImage(img);
    } catch {
      frozenSrc = "";
    }

    const canvas = await html2canvas(document.getElementById("card"),{
      useCORS:true,
      scale:2,
      backgroundColor:null
    });

    const link = document.createElement("a");
    link.download = "blessing.png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  } finally {
    if(frozenSrc) img.src = originalSrc;
    controls.style.display = "flex";
    isCapturing = false;
  }
}

document.getElementById("search").addEventListener("keydown", e => {
  if(e.key === "Enter") e.preventDefault();
});

randomVerse();
</script>

</body>
</html>
