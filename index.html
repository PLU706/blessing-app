<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Blessing</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 360px;
  height: 640px;
  border-radius: 30px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

/* 背景图（关键修复） */
.bg-img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 渐变遮罩 */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
}

/* 内容 */
.content {
  position: relative;
  color: white;
  text-align: center;
  padding: 40px 20px;
}

h1 { font-size: 26px; }

.verse {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.6;
}

.ref {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

.footer {
  margin-top: 30px;
  font-style: italic;
}

/* 控件 */
.controls {
  position: absolute;
  bottom: 10px;
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 5px;
}

input {
  padding: 5px;
  border-radius: 8px;
  border: none;
  width: 120px;
}

button {
  padding: 6px 10px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="card" id="card">

  <!-- ✅ 用 img 替代 background-image -->
  <img id="bg" class="bg-img" crossorigin="anonymous">

  <div class="overlay"></div>

  <div class="content">
    <h1 id="day"></h1>
    <div class="verse" id="verse">Loading...</div>
    <div class="ref" id="ref"></div>
    <div class="footer" id="footer"></div>
  </div>

  <div class="controls">
    <input id="search" placeholder="John 3:16">
    <button onclick="searchVerse()">🔍 搜索/Search</button>
    <button onclick="randomVerse()">🔁 随机/Random</button>
    <button onclick="toggleLang()">🌍 中文/EN</button>
    <button onclick="downloadImage()">📸 保存/Download</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<script>
let isChinese = false;

/* 图片 */
const images = [
  "https://images.unsplash.com/photo-1506744038136-46273834b3fb",
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
  "https://images.unsplash.com/photo-1493244040629-496f6d136cc3"
];

const bg = document.getElementById("bg");
bg.src = images[Math.floor(Math.random()*images.length)];

/* 星期 */
const days_en = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const days_zh = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];

function updateDay(){
  const today = new Date();
  const day = isChinese ? days_zh[today.getDay()] : days_en[today.getDay()];
  document.getElementById("day").innerText =
    (isChinese ? "祝福 " : "Blessing ") + day;
}

/* 搜索经文 */
async function searchVerse(){
  const query = document.getElementById("search").value || "Psalm 23:1";

  document.getElementById("verse").innerText = "Loading...";

  try{
    const res = await fetch(`https://bible-api.com/${query}`);
    const data = await res.json();

    document.getElementById("verse").innerText = data.text;
    document.getElementById("ref").innerText = data.reference;

  }catch{
    document.getElementById("verse").innerText = "Not found";
  }

  updateFooter();
  updateDay();
}

/* 随机 */
function randomVerse(){
  const list = ["John 3:16","Psalm 23:1","Romans 8:28","Philippians 4:13"];
  document.getElementById("search").value =
    list[Math.floor(Math.random()*list.length)];
  searchVerse();
}

/* 中英文切换 */
function toggleLang(){
  isChinese = !isChinese;
  updateDay();
  updateFooter();
}

/* footer */
function updateFooter(){
  document.getElementById("footer").innerText =
    isChinese ? "愿你有美好的一天" : "Have a Beautiful Day";
}

/* 📸 下载（终极稳定版） */
function downloadImage(){
  const controls = document.querySelector(".controls");
  controls.style.display = "none";

  const img = document.getElementById("bg");

  if (!img.complete) {
    img.onload = capture;
  } else {
    capture();
  }

  function capture(){
    html2canvas(document.getElementById("card"), {
      useCORS: true,
      scale: 2
    }).then(canvas=>{
      const link = document.createElement("a");
      link.download = "blessing.png";
      link.href = canvas.toDataURL();
      link.click();
      controls.style.display = "flex";
    });
  }
}

/* 初始化 */
searchVerse();
</script>

</body>
</html>
